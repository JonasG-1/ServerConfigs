version: "3.8"

services:
  teamspeak:
    image: teamspeak:latest
    container_name: teamspeak
    restart: unless-stopped
    environment:
      - TS3SERVER_LICENSE=accept
    ports:
      - "9987:9987/udp"   # Voice
      - "10011:10011/tcp" # ServerQuery
      - "30033:30033/tcp" # File transfer
    volumes:
      - ./ts3-data:/var/ts3server
